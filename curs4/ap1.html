<head>

    <title>Document</title>
    <style>
        table, td{
            border: 2px solid #4e4e4e;
            padding: 10px;
        }

        tr:nth-child(2n){
            background-color: aqua;
        }
        tr:nth-child(2n+1){
            background-color: blue;

        }
        
    </style>
</head>
<body>

    <table>
        <tr>
            <td>Nr. curent</td>

        </tr>

            <td>1</td>
            <td>Popescu</td>

        </tr>
        <tr>

            <td>093242229323</td>
        </tr>
    </table>
</body>
</html>
